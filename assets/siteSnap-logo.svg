<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Camera Icon Background -->
  <rect x="10" y="10" width="80" height="80" rx="15" fill="#00c080"/>
  
  <!-- Camera Icon Inner Elements -->
  <rect x="25" y="25" width="50" height="40" rx="5" fill="white"/>
  <circle cx="50" cy="50" r="15" stroke="white" stroke-width="5" fill="transparent"/>
  <circle cx="50" cy="50" r="7" fill="white"/>
  
  <!-- SiteSnap Text -->
  <text x="110" y="60" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#222222">
    <tspan fill="#222222">Site</tspan><tspan fill="#00c080">Snap</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="110" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#5a5a5a">
    Project Documentation Made Simple
  </text>
